<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pokédex</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Pokédex</h1>

    <input type="text" id="pokemonInput" placeholder="Digite um Pokémon">
    
    <div class="buttons">
      <button onclick="buscarPokemon()">Buscar</button>
      <button onclick="pokemonAleatorio()">Aleatório</button>
    </div>

    <div id="card" class="card">
      <p>Busque um Pokémon 👀</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
